<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Under Maintenance - Apex Express Logistics</title>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  body {
    background: linear-gradient(135deg, #0A2540 0%, #1E3A5F 50%, #D4AF37 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    color: #fff;
  }

  /* Animated background blobs */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.4;
    animation: float 8s ease-in-out infinite;
  }
  .blob1 { width: 400px; height: 400px; background: #D4AF37; top: -100px; left: -100px; }
  .blob2 { width: 300px; height: 300px; background: #0A2540; bottom: -80px; right: -80px; animation-delay: 2s; }

  @keyframes float {
    0%, 100% { transform: translateY(0px) scale(1); }
    50% { transform: translateY(-30px) scale(1.05); }
  }

  /* Glass Card */
  .card {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 24px;
    padding: 50px 40px;
    text-align: center;
    max-width: 500px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    z-index: 10;
  }

  .icon {
    font-size: 60px;
    margin-bottom: 20px;
    animation: spin 3s linear infinite;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  h1 {
    font-size: 2.2rem;
    margin-bottom: 15px;
    font-weight: 700;
    color: #fff;
  }

  p {
    font-size: 1.1rem;
    line-height: 1.6;
    color: rgba(255, 255, 255, 0.9);
    margin-bottom: 10px;
  }

  .highlight {
    color: #D4AF37;
    font-weight: 600;
  }

  .footer {
    margin-top: 30px;
    font-size: 0.9rem;
    color: rgba(255, 255, 255, 0.7);
  }
</style>
</head>
<body>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <div class="card">
    <div class="icon">⚙️</div>
    <h1>Site Maintenance</h1>
    <p>Kindly exercise patience, <span class="highlight">we shall be back soon</span>.</p>
    <p>Our engineers are working on it to serve you better.</p>
    <div class="footer">
      Atlas Express Logistics
    </div>
  </div>
</body>
</html>
