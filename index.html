<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Under Maintenance - ATLAS EXPRESS SERVICE</title>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  body {
    background: linear-gradient(135deg, #0A2540 0%, #1E3A5F 50%, #D4AF37 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    color: #fff;
  }

  /* Animated background blobs */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.4;
    animation: float 8s ease-in-out infinite;
  }
  .blob1 { width: 400px; height: 400px; background: #D4AF37; top: -100px; left: -100px; }
  .blob2 { width: 300px; height: 300px; background: #0A2540; bottom: -80px; right: -80px; animation-delay: 2s; }

  @keyframes float {
    0%, 100% { transform: translateY(0px) scale(1); }
    50% { transform: translateY(-30px) scale(1.05); }
  }

  /* Glass Card */
  .card {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 24px;
    padding: 50px 40px;
    text-align: center;
    max-width: 520px;
    width: 90%;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    z-index: 10;
    animation: cardIn 0.8s ease-out both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(24px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .icon {
    font-size: 60px;
    margin-bottom: 20px;
    animation: spin 3s linear infinite;
    display: inline-block;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  h1 {
    font-size: 2.2rem;
    margin-bottom: 15px;
    font-weight: 700;
    color: #fff;
  }

  p {
    font-size: 1.1rem;
    line-height: 1.6;
    color: rgba(255, 255, 255, 0.9);
    margin-bottom: 10px;
  }

  .highlight {
    color: #D4AF37;
    font-weight: 600;
  }

  /* New: live clock */
  .clock-row {
    margin-top: 24px;
    display: flex;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .clock-box {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 12px;
    padding: 10px 18px;
    min-width: 150px;
  }

  .clock-label {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.6);
    margin-bottom: 4px;
  }

  .clock-value {
    font-size: 1.15rem;
    font-weight: 600;
    color: #fff;
    font-variant-numeric: tabular-nums;
  }

  /* New: countdown */
  .countdown-wrap {
    margin-top: 22px;
  }

  .countdown-value {
    font-size: 2.6rem;
    font-weight: 700;
    color: #D4AF37;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.03em;
  }

  .countdown-caption {
    font-size: 0.85rem;
    color: rgba(255, 255, 255, 0.7);
    margin-top: 4px;
  }

  .progress-track {
    width: 100%;
    height: 6px;
    background: rgba(255, 255, 255, 0.15);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 16px;
  }

  .progress-fill {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #D4AF37, #fff8dc);
    border-radius: 4px;
    transition: width 1s linear;
  }

  .progress-fill.pulse {
    animation: pulseFlash 0.6s ease-out;
  }

  @keyframes pulseFlash {
    0% { filter: brightness(1); }
    40% { filter: brightness(1.8); }
    100% { filter: brightness(1); }
  }

  .footer {
    margin-top: 30px;
    font-size: 0.9rem;
    color: rgba(255, 255, 255, 0.7);
  }

  @media (max-width: 480px) {
    h1 { font-size: 1.7rem; }
    .countdown-value { font-size: 2rem; }
    .clock-box { min-width: 130px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .blob { animation: none; }
    .icon { animation: none; }
    .card { animation: none; }
  }
</style>
</head>
<body>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <div class="card">
    <div class="icon">⚙️</div>
    <h1>Site Maintenance</h1>
    <p>Kindly exercise patience, <span class="highlight">we shall be back soon</span>.</p>
    <p>Our engineers are working on it to serve you better.</p>

    <div class="countdown-wrap">
      <div class="countdown-value" id="countdown">30:00</div>
      <div class="countdown-caption">Estimated time remaining — resets automatically if we're still working</div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div class="clock-row">
      <div class="clock-box">
        <div class="clock-label">Current Time</div>
        <div class="clock-value" id="clock">--:--:--</div>
      </div>
      <div class="clock-box">
        <div class="clock-label">Date</div>
        <div class="clock-value" id="dateline">Loading…</div>
      </div>
    </div>

    <div class="footer">
      ATLAS EXPRESS SERVICE 
    </div>
  </div>

<script>
  // Live clock + date
  const clockEl = document.getElementById('clock');
  const dateEl = document.getElementById('dateline');

  function updateClock() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    const ss = String(now.getSeconds()).padStart(2, '0');
    clockEl.textContent = `${hh}:${mm}:${ss}`;

    dateEl.textContent = now.toLocaleDateString(undefined, {
      weekday: 'short', month: 'short', day: 'numeric'
    });
  }
  updateClock();
  setInterval(updateClock, 1000);

  // Looping 30-minute countdown
  const TOTAL_SECONDS = 30 * 60;
  let remaining = TOTAL_SECONDS;
  const countdownEl = document.getElementById('countdown');
  const progressFill = document.getElementById('progressFill');

  function renderCountdown() {
    const m = String(Math.floor(remaining / 60)).padStart(2, '0');
    const s = String(remaining % 60).padStart(2, '0');
    countdownEl.textContent = `${m}:${s}`;
    progressFill.style.width = (remaining / TOTAL_SECONDS) * 100 + '%';
  }

  function tick() {
    remaining -= 1;
    if (remaining < 0) {
      remaining = TOTAL_SECONDS;
      progressFill.classList.remove('pulse');
      void progressFill.offsetWidth;
      progressFill.classList.add('pulse');
    }
    renderCountdown();
  }

  renderCountdown();
  setInterval(tick, 1000);
</script>
</body>
</html>
